  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}
    body{
      font-family:'IBM Plex Sans Thai','Noto Sans Thai','Helvetica Neue',Arial,sans-serif;
      background:#FAFAFA;
      color:#1A1A1A;
      overflow-x:hidden;
    }
    input,select,button,textarea{font-family:inherit}
    /* Prevent iOS zoom on input focus */
    input,select,textarea{font-size:16px!important}

    /* ── Scrollbar ─────────────── */
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#C8102E;border-radius:3px}

    /* ── Tablet (600-900px) ────── */
    @media(max-width:900px){
      th,td{padding:7px 8px!important;font-size:11.5px!important}
    }

    /* ── Mobile (max 600px) ─────── */
    @media(max-width:600px){
      th,td{padding:6px 6px!important;font-size:11px!important}
      input,select{width:100%}
    }

    /* ── Small mobile (max 480px) ─ */
    @media(max-width:480px){
      th,td{padding:5px 5px!important;font-size:10.5px!important}
      .hide-mobile{display:none!important}
    }

    /* ── Foldable / tiny (max 380px) ── */
    @media(max-width:380px){
      th,td{padding:4px 4px!important;font-size:10px!important}
      /* Nav: icon only */
      .santi-nav-label{display:none!important}
      button{padding-left:6px!important;padding-right:6px!important}
    }

    /* ── Galaxy Z Fold inner (max 280px) ── */
    @media(max-width:280px){
      th,td{font-size:9px!important}
      body{font-size:11px}
    }
  </style>
</head>

  <div id="root"></div>
</body>
